---

- hosts: all
  become: true
  tasks:

  - name: Install apache and php for Ubuntu servers
    apt:
      name:
        - apache2
        - php
      state: latest
      update_cache: yes
    when: ansible_facts["distribution"] == "Ubuntu"

  - name: Install apache and php for CentOS/RedHat servers
    dnf:
      name:
       - httpd
       - php-ftp
      state: latest
      update_cache: yes
    when: ansible_facts["os_family"] == "RedHat"  

